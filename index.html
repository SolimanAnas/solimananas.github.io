<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soliman Anas - Developer Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #020617;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 85%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; color: #10b981; }
        p { font-size: 16px; color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background-color: #10b981;
            color: #020617;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn:hover { background-color: #059669; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Soliman Anas</h1>
        <p>Welcome to my developer portfolio. Check out my latest Android & Web applications.</p>
        <a href="/Tasbee7/" class="btn">🚀 Open Zad Al-Muslim</a>
    </div>
</body>
</html>
